# ------ Agent Endpoints ------
  /agent/sessions:
    post:
      tags: [Agent Communication]
      summary: Yeni bir oturum başlat (Agent tarafından kullanılır)
      security:
        - AgentBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rule_id: { type: integer }
                server_id: { type: integer }
                username: { type: string }
      responses:
        '201':
          description: Oturum oluşturuldu
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  valid_until: { type: string, format: date-time, nullable: true }

  /agent/sessions/{sessionID}:
    patch:
      tags: [Agent Communication]
      summary: Oturum durumunu güncelle (Agent tarafından kullanılır)
      security:
        - AgentBearerAuth: []
      parameters:
        - name: sessionID
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: "ended"
      responses:
        '200':
          description: Oturum güncellendi


  # ------ WebSocket ------
  /ws/sessions/{sessionID}:
    get:
      tags: [WebSocket Stream]
      summary: Oturum veri akışı için WebSocket bağlantısı
      description: |
        Bu bir WebSocket endpoint'idir. HTTP isteği, WebSocket protokolüne yükseltilir.
        - **Agent Kullanımı:** Herhangi bir query parametresi olmadan bağlanır. `Authorization: Bearer <AGENT_SECRET_TOKEN>` başlığı GEREKLİDİR.
        - **Yönetici Kullanımı (Canlı İzleme):** `?role=viewer&token=<ADMIN_TOKEN>` query parametreleri ile bağlanılır. `Authorization` başlığı GEREKMEZ.
      parameters:
        - name: sessionID
          in: path
          required: true
          schema: { type: integer }
        - name: role
          in: query
          schema:
            type: string
            enum: [viewer]
          description: "Yönetici canlı izleme modunu aktive etmek için 'viewer' olarak ayarlanmalıdır."
        - name: token
          in: query
          schema:
            type: string
          description: "Yönetici token'ı (role=viewer ise gereklidir)."
      responses:
        '101':
          description: WebSocket bağlantısı başarıyla kuruldu.
        '400':
          description: Geçersiz Oturum ID'si.
        '401':
          description: "Yönetici token'ı eksik veya geçersiz (role=viewer ise)."
