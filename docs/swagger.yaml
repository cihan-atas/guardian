openapi: 3.0.0
info:
  title: Guardian API
  description: "Geçici ve denetlenebilir SSH erişimi sağlayan Guardian sisteminin API dökümanı. API, bir merkezi sunucu (guardian-server) ve hedef makinelerdeki ajanlardan (guardian-agent) oluşur."
  version: "1.3.0"
servers:
  - url: https://server_ip:5555/api
    description: Yerel Geliştirme Sunucusu

components:
  # ------ GÜVENLİK ŞEMALARI ------
  securitySchemes:
    AdminBearerAuth:
      type: http
      scheme: bearer
      description: "Yönetici (UI/CLI) işlemlerini yapmak için gereken JWT/Bearer token. .env dosyasındaki GUARDIAN_ADMIN_TOKEN."
    AgentBearerAuth:
      type: http
      scheme: bearer
      description: "Agent'ın sunucu ile iletişim kurmak için kullandığı paylaşımlı sır. .env dosyasındaki GUARDIAN_SECRET_TOKEN."

  # ------ VERİ MODELLERİ (SCHEMAS) ------
  schemas:
    # --- YENİDEN KULLANILABİLİR MODELLER ---
    NullString:
      type: object
      description: "Go backend'indeki sql.NullString yapısını temsil eder. Bir alanın `null` olabilmesini sağlar."
      properties:
        String:
          type: string
          description: "Alanının metin değeri. Eğer Valid false ise bu değerin bir anlamı yoktur."
        Valid:
          type: boolean
          description: "Eğer true ise String değeri geçerlidir. Eğer false ise alan veritabanında NULL olarak kabul edilir."
      example:
        String: "Opsiyonel açıklama"
        Valid: true
        
    ApiError:
      type: object
      properties:
        error:
          type: string
          example: "Hata mesajı burada yer alır."

    # --- KAYNAK MODELLERİ ---
    AuthStatus:
      type: object
      properties:
        status:
          type: string
          example: "ok"

    Server:
      type: object
      required: [hostname, ip_address]
      properties:
        id:
          type: integer
          example: 1
          readOnly: true
        hostname:
          type: string
          example: "production-web-1"
        ip_address:
          type: string
          example: "192.168.1.10"
        description:
          type: string
          example: "Ana web sunucusu"
        created_at:
          type: string
          format: date-time
          example: "2024-07-04T10:00:00Z"
          readOnly: true

    SystemUser:
      type: object
      required: [username]
      properties:
        id:
          type: integer
          example: 1
          readOnly: true
        username:
          type: string
          example: "ec2-user"
        description:
          $ref: '#/components/schemas/NullString'
        created_at:
          type: string
          format: date-time
          example: "2024-07-04T10:05:00Z"
          readOnly: true

    PublicKey:
      type: object
      required: [key_name, ssh_public_key]
      properties:
        id:
          type: integer
          example: 1
          readOnly: true
        key_name:
          type: string
          example: "devops-team-lead-key"
        ssh_public_key:
          type: string
          example: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABgQC... user@host"
        fingerprint_sha256:
          type: string
          example: "SHA256:AbCdEfGhIjKlMnOpQrStUvWxYz1234567890"
          readOnly: true
        created_at:
          type: string
          format: date-time
          example: "2024-07-04T10:10:00Z"
          readOnly: true

    AccessRule:
      type: object
      required: [server_id, public_key_id, system_user_id, valid_from, valid_until]
      properties:
        id:
          type: integer
          example: 1
          readOnly: true
        server_id:
          type: integer
          example: 1
        public_key_id:
          type: integer
          example: 1
        system_user_id:
          type: integer
          example: 1
        valid_from:
          type: string
          format: date-time
          example: "2024-07-04T12:00:00Z"
        valid_until:
          type: string
          format: date-time
          example: "2024-07-04T13:00:00Z"
        status:
          type: string
          enum: [pending, active, expired]
          example: "active"
          readOnly: true
        created_at:
          type: string
          format: date-time
          example: "2024-07-04T11:55:00Z"
          readOnly: true
    
    AccessRuleDetails:
      allOf:
        - $ref: '#/components/schemas/AccessRule'
        - type: object
          properties:
            server_hostname:
              type: string
              example: "production-web-1"
            username:
              type: string
              example: "ec2-user"
            key_name:
              type: string
              example: "devops-team-lead-key"

    Session:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        rule_id:
          type: integer
          nullable: true
        server_id:
          type: integer
        username:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          example: "active"
        server_hostname:
          type: string
          readOnly: true
        server_ip:
          type: string
          readOnly: true

    # --- SAYFALAMA (PAGINATION) MODELLERİ ---
    PaginatedServersResponse:
      type: object
      properties:
        total_records: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        data:
          type: array
          items:
            $ref: '#/components/schemas/Server'
            
    PaginatedUsersResponse:
      type: object
      properties:
        total_records: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        data:
          type: array
          items:
            $ref: '#/components/schemas/SystemUser'

    PaginatedKeysResponse:
      type: object
      properties:
        total_records: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        data:
          type: array
          items:
            $ref: '#/components/schemas/PublicKey'
            
    PaginatedRulesResponse:
      type: object
      properties:
        total_records: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        data:
          type: array
          items:
            $ref: '#/components/schemas/AccessRuleDetails'
            
    PaginatedSessionsResponse:
      type: object
      properties:
        total_records: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        data:
          type: array
          items:
            $ref: '#/components/schemas/Session'
            
    # --- DASHBOARD MODELLERİ ---
    DashboardStats:
      type: object
      properties:
        active_sessions: { type: integer }
        expired_rules: { type: integer }
        total_servers: { type: integer }
        total_users: { type: integer }
        pending_rules: { type: integer }
        total_keys: { type: integer }
        today_sessions: { type: integer }
        failed_sessions: { type: integer }
        
    ChartData:
      type: object
      properties:
        name:
          type: string
        value:
          type: integer
          
    ActiveSessionInfo:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        start_time: { type: string, format: date-time }
        server_hostname: { type: string }
        
    AuditLog:
      type: object
      properties:
        id: { type: integer }
        admin_ref: { type: string }
        action: { type: string }
        target_type: { type: string }
        target_id: { type: integer, nullable: true }
        status: { type: string }
        error_message: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        
    # --- OTURUM DETAY MODELLERİ ---
    SessionEvent:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        session_id: { type: integer }
        event_type: { type: string, enum: [input, output] }
        data: { type: string, format: byte, description: "Base64 encoded terminal data" }
        event_time: { type: string, format: date-time }

    ParsedCommand:
      type: object
      properties:
        timestamp: { type: string, format: date-time }
        command: { type: string }
        output: { type: string }

    SessionDetails:
      type: object
      properties:
        session_info:
          type: object
          properties:
            id: { type: integer }
            username: { type: string }
            server_hostname: { type: string }
            server_ip: { type: string }
            start_time: { type: string, format: date-time }
            end_time: { type: string, format: date-time, nullable: true }
            status: { type: string }
        commands:
          type: array
          items:
            $ref: '#/components/schemas/ParsedCommand'

# ------ YOLLAR (PATHS) ------
paths:
  # ------ Yetkilendirme Kontrolü ------
  /auth/check:
    get:
      tags: [Authentication]
      summary: Bir yönetici token'ının geçerliliğini kontrol et
      description: Bu endpoint, genellikle UI'ın başlangıçta kullanıcının hala login olup olmadığını anlaması için kullanılır. Başarılı yanıt (200 OK), token'ın geçerli olduğunu gösterir.
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Token geçerli.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatus'
        '401':
          description: Yetkisiz (Token eksik)
        '403':
          description: Yasak (Token geçersiz)

  # ------ Sunucu Yönetimi ------
  /servers:
    get:
      tags: [Server Management]
      summary: Sunucuları sayfalama ile listele
      security:
        - AdminBearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 8 }
      responses:
        '200':
          description: Başarılı yanıt, sunucuların listesi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedServersResponse'
    post:
      tags: [Server Management]
      summary: Yeni bir sunucu oluştur
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Server'
      responses:
        '201':
          description: Sunucu başarıyla oluşturuldu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
        '400':
          description: Geçersiz istek gövdesi

  /servers/{serverID}:
    parameters:
      - name: serverID
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Server Management]
      summary: Belirli bir sunucuyu getir
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Başarılı yanıt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
        '404':
          description: Sunucu bulunamadı
    put:
      tags: [Server Management]
      summary: Bir sunucuyu tamamen güncelle (Tüm alanlar gereklidir)
      description: Bir sunucunun tüm alanlarını (hostname, ip_address, description) tek seferde günceller. Sadece bir alanı değiştirmek için PATCH kullanın.
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Server'
      responses:
        '200':
          description: Başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
        '404':
          description: Sunucu bulunamadı
    patch:
      tags: [Server Management]
      summary: Bir sunucuyu kısmen güncelle
      description: Bir sunucunun bir veya daha fazla alanını (hostname, ip_address, description) günceller.
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hostname: { type: string }
                ip_address: { type: string }
                description: { type: string }
      responses:
        '200':
          description: Başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
        '404':
          description: Sunucu bulunamadı
    delete:
      tags: [Server Management]
      summary: Bir sunucuyu sil
      security:
        - AdminBearerAuth: []
      responses:
        '204':
          description: Başarıyla silindi (içerik yok)
        '404':
          description: Sunucu bulunamadı
        '409':
          description: "Çakışma. Sunucu, bir veya daha fazla erişim kuralı tarafından kullanıldığı için silinemiyor."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # ------ Kullanıcı Yönetimi ------
  /users:
    get:
      tags: [User Management]
      summary: Sistem kullanıcılarını sayfalama ile listele
      security:
        - AdminBearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 8 }
      responses:
        '200':
          description: Başarılı yanıt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsersResponse'
    post:
      tags: [User Management]
      summary: Yeni bir sistem kullanıcısı tanımla
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemUser'
      responses:
        '201':
          description: Kullanıcı oluşturuldu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemUser'

  /users/{userID}:
    parameters:
      - name: userID
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [User Management]
      summary: Belirli bir sistem kullanıcısını getir
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Başarılı yanıt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemUser'
        '404':
          description: Kullanıcı bulunamadı
    patch:
      tags: [User Management]
      summary: Bir sistem kullanıcısının açıklamasını güncelle
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: '#/components/schemas/NullString'
      responses:
        '200':
          description: Kullanıcı başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemUser'
        '404':
          description: Kullanıcı bulunamadı
    delete:
      tags: [User Management]
      summary: Bir sistem kullanıcısını sil
      security:
        - AdminBearerAuth: []
      responses:
        '204':
          description: Kullanıcı başarıyla silindi (İçerik yok)
        '404':
          description: Silinecek kullanıcı bulunamadı
        '409':
          description: "Çakışma. Kullanıcı, bir kural tarafından kullanıldığı için silinemiyor."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # ------ Anahtar Yönetimi ------
  /keys:
    get:
      tags: [Key Management]
      summary: Public anahtarları sayfalama ile listele
      security:
        - AdminBearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 8 }
      responses:
        '200':
          description: Başarılı yanıt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedKeysResponse'
    post:
      tags: [Key Management]
      summary: Yeni bir public anahtar kaydet
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicKey'
      responses:
        '201':
          description: Anahtar oluşturuldu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicKey'
        '400':
          description: Geçersiz public anahtar formatı

  /keys/{keyID}:
    parameters:
      - name: keyID
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Key Management]
      summary: Belirli bir public anahtarı getir
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Başarılı yanıt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicKey'
        '404':
          description: Anahtar bulunamadı
    patch:
      tags: [Key Management]
      summary: Bir public anahtarın adını güncelle
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                key_name:
                  type: string
                  example: "jane-doe-new-laptop-key"
      responses:
        '200':
          description: Başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicKey'
        '404':
          description: Anahtar bulunamadı
    delete:
      tags: [Key Management]
      summary: Bir public anahtarı sil
      security:
        - AdminBearerAuth: []
      responses:
        '204':
          description: Anahtar başarıyla silindi
        '404':
          description: Silinecek anahtar bulunamadı
        '409':
          description: "Çakışma. Anahtar, bir kural tarafından kullanıldığı için silinemiyor."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # ------ Kural Yönetimi ------
  /rules:
    get:
      tags: [Rule Management]
      summary: Erişim kurallarını sayfalama ile listele
      security:
        - AdminBearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 8 }
      responses:
        '200':
          description: Başarılı yanıt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRulesResponse'
    post:
      tags: [Rule Management]
      summary: Yeni bir erişim kuralı oluştur
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessRule'
      responses:
        '201':
          description: Kural oluşturuldu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessRule'
        '400':
          description: Hedef sunucudaki kullanıcı doğrulanamadı veya geçersiz ID'ler.

  /rules/{ruleID}:
    parameters:
      - name: ruleID
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Rule Management]
      summary: Belirli bir kuralı getir
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Başarılı yanıt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessRule'
        '404':
          description: Kural bulunamadı
    put:
      tags: [Rule Management]
      summary: Bir kuralı tamamen güncelle
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessRule'
      responses:
        '200':
          description: Başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessRule'
    patch:
      tags: [Rule Management]
      summary: Bir kuralın zamanını güncelle
      description: Bir kuralın 'valid_from' ve 'valid_until' zamanlarını günceller. Bu işlem kuralın durumunu (pending, active, expired) otomatik olarak yeniden hesaplar.
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [valid_from, valid_until]
              properties:
                valid_from:
                  type: string
                  format: date-time
                valid_until:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessRule'
        '404':
          description: Kural bulunamadı
    delete:
      tags: [Rule Management]
      summary: Bir kuralı sil
      security:
        - AdminBearerAuth: []
      responses:
        '204':
          description: Başarıyla silindi
        '404':
          description: Kural bulunamadı

  # ------ Oturum Yönetimi (Admin & Agent) ------
  /sessions:
    get:
      tags: [Session Management]
      summary: Oturumları sayfalama ile listele (Yönetici)
      security:
        - AdminBearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 8 }
      responses:
        '200':
          description: Başarılı yanıt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSessionsResponse'
    post:
      tags: [Session Management]
      summary: Yeni bir oturum başlat (Agent tarafından kullanılır)
      security:
        - AgentBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rule_id: { type: integer }
                server_id: { type: integer }
                username: { type: string }
      responses:
        '201':
          description: Oturum oluşturuldu
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  valid_until: { type: string, format: date-time, nullable: true }

  /sessions/{sessionID}:
    parameters:
      - name: sessionID
        in: path
        required: true
        schema: { type: integer }
    patch:
      tags: [Session Management]
      summary: Oturum durumunu güncelle (Agent tarafından kullanılır)
      security:
        - AgentBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: "ended"
      responses:
        '200':
          description: Oturum güncellendi
    delete:
      tags: [Session Management]
      summary: Aktif bir oturumu zorla sonlandır (Yönetici tarafından kullanılır)
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Sonlandırma komutu gönderildi
          content:
            text/plain:
              schema:
                type: string
                example: "Oturum 42 için sonlandırma komutu başarıyla gönderildi ve durum güncellendi."
        '404':
          description: Aktif oturum bulunamadı

  /sessions/{sessionID}/replay:
    get:
      tags: [Session Management]
      summary: Bir oturumun tekrarını al
      security:
        - AdminBearerAuth: []
      parameters:
        - name: sessionID
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Oturum olaylarının listesi
          content:
            application/json:
              schema:
