<div class="flex items-center justify-center min-h-screen bg-dark-main">
  <div class="w-full max-w-md p-8 space-y-8 bg-dark-card rounded-2xl shadow-lg border border-dark-border">
    
     <div class="text-center">
      <span class="text-6xl text-accent">🛡️</span>
      <h1 class="mt-4 text-3xl font-bold tracking-tight text-text-main">Guardian'a Hoş Geldiniz</h1>
      <p class="mt-2 text-text-secondary">Devam etmek için hesabınızla giriş yapın.</p>
    </div>

     <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label for="username" class="block text-sm font-medium text-text-secondary mb-1">Kullanıcı adı</label>
        <input
          id="username"
          name="username"
          type="text"
          formControlName="username"
          required
          autocomplete="username"
          class="w-full px-4 py-3 text-lg text-text-main bg-dark-main border border-dark-border rounded-md focus:ring-2 focus:ring-accent focus:border-accent"
          placeholder="admin">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-text-secondary mb-1">Parola</label>
        <input
          id="password"
          name="password"
          type="password"
          formControlName="password"
          required
          autocomplete="current-password"
          class="w-full px-4 py-3 text-lg text-text-main bg-dark-main border border-dark-border rounded-md focus:ring-2 focus:ring-accent focus:border-accent"
          placeholder="••••••••">
      </div>

  <div>
        <button 
          type="submit" 
          [disabled]="loginForm.invalid || isChecking"
          class="w-full flex justify-center items-center py-3 font-semibold text-white bg-accent rounded-md hover:bg-accent-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent disabled:bg-dark-interactive disabled:text-text-secondary disabled:cursor-not-allowed">
          
          <ng-container *ngIf="!isChecking">Giriş Yap</ng-container>
          <ng-container *ngIf="isChecking">
             <fa-icon [icon]="faSpinner" class="fa-spin mr-2"></fa-icon>
            <span>Giriş yapılıyor...</span>
          </ng-container>

        </button>
      </div>
    </form>

  </div>
</div>
