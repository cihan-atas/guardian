services:
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_USER: guardian_user
      POSTGRES_PASSWORD: guardian_password
      POSTGRES_DB: guardian_db
    ports:
      - "5432:5432"
    volumes:
      - guardian_postgres_data:/var/lib/postgresql/data

volumes:
  guardian_postgres_data:
