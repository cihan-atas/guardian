services:
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - guardian_postgres_data:/var/lib/postgresql/data
      # İlk (boş volume) başlangıçta şemayı otomatik olarak oluşturur.
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  guardian-server:
    build:
      context: ./guardian-server
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      GUARDIAN_SERVER_PORT: 5555
      GUARDIAN_AGENT_PORT: 6666
      GUARDIAN_SECRET_TOKEN: ${GUARDIAN_SECRET_TOKEN}
      GUARDIAN_ADMIN_TOKEN: ${GUARDIAN_ADMIN_TOKEN}
      # Bildirimler & riskli komut alarmı (opsiyonel; .env'de boşsa devre dışı).
      GUARDIAN_WEBHOOK_URL: ${GUARDIAN_WEBHOOK_URL:-}
      GUARDIAN_SMTP_HOST: ${GUARDIAN_SMTP_HOST:-}
      GUARDIAN_SMTP_PORT: ${GUARDIAN_SMTP_PORT:-587}
      GUARDIAN_SMTP_USER: ${GUARDIAN_SMTP_USER:-}
      GUARDIAN_SMTP_PASS: ${GUARDIAN_SMTP_PASS:-}
      GUARDIAN_SMTP_FROM: ${GUARDIAN_SMTP_FROM:-}
      GUARDIAN_ALERT_EMAIL_TO: ${GUARDIAN_ALERT_EMAIL_TO:-}
      GUARDIAN_RISKY_AUTOACTION: ${GUARDIAN_RISKY_AUTOACTION:-none}
      TLS_CA_FILE: /etc/guardian/certs/ca.crt
      TLS_CERT_FILE: /etc/guardian/certs/server.crt
      TLS_KEY_FILE: /etc/guardian/certs/server.key
    volumes:
      # generate-certs.sh ile oluşturulan sertifika dizini (salt okunur).
      - ./certs:/etc/guardian/certs:ro
    ports:
      # Agent'ların bağlandığı port (diğer sunuculardaki agent'lar için gerekli).
      - "6666:6666"
      # guardian-cli'nin doğrudan erişimi için (opsiyonel; sadece UI kullanılacaksa kapatılabilir).
      - "5555:5555"

  guardian-ui:
    build:
      context: ./guardian-ui
    restart: always
    depends_on:
      - guardian-server
    environment:
      GUARDIAN_SERVER_UPSTREAM: guardian-server:5555
    ports:
      - "80:80"

volumes:
  guardian_postgres_data:
